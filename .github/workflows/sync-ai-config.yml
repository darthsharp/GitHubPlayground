name: Sync AI Configuration

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sundays

jobs:
  sync:
    uses: CreativeCodersTeam/ai-base/sync-ai-config.yml@main
    with:
      languages: 'csharp,typescript'
      ai-systems: 'copilot,claude,junie'
      ai-base-version: 'feature/jstooltodotnet'